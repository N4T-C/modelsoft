<!DOCTYPE html>
<html>
<head>
<title>ATM System</title>
<style>
body { font-family: Arial; background:#f5f5f5; }
.box { background:white; padding:20px; margin:20px; border-radius:10px; }
button { padding:8px; }
</style>
</head>

<body>

<div class="box">
<h2>ATM Withdraw Simulation</h2>

<label>Balance:</label>
<input type="number" id="balance"><br><br>

<label>Withdraw Amount:</label>
<input type="number" id="amount"><br><br>

<button onclick="withdraw()">Withdraw</button>

<p id="result"></p>
</div>

<script>
function withdraw() {
    let bal = parseInt(document.getElementById("balance").value);
    let amt = parseInt(document.getElementById("amount").value);

    if (amt % 100 !== 0) {
        document.getElementById("result").innerText = "Amount must be multiple of 100";
    }
    else if (amt > bal) {
        document.getElementById("result").innerText = "Insufficient Balance";
    }
    else {
        document.getElementById("result").innerText = "Transaction Successful. Remaining: " + (bal - amt);
    }
}
</script>

</body>
</html>
